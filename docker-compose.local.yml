services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=local
    volumes:
      - .:/code
    ports:
      - '8000:8000'
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --timeout-graceful-shutdown=1

  tailwindcss:
    image: ghcr.io/scriptogre/tailwindcss:latest
    tty: true
    volumes:
      - .:/app
    command: ["-i", "./static/css/input.css", "-o", "./static/css/output.css", "--watch"]
